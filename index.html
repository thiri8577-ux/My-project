<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Todo App</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding-top: 60px;
    }

    input {
      padding: 10px;
      width: 250px;
      font-size: 16px;
    }

    button {
      padding: 10px 15px;
      margin-left: 5px;
      cursor: pointer;
    }

    li {
      list-style: none;
      background: #222;
      margin: 10px auto;
      padding: 10px;
      width: 300px;
      display: flex;
      justify-content: space-between;
    }

    .delete {
      background: red;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

  <h1>My Todo App 📝</h1>

  <input id="task" placeholder="Enter task">
  <button onclick="addTask()">Add</button>

  <ul id="list"></ul>

  <script>
    function addTask() {
      let taskInput = document.getElementById("task");
      let taskText = taskInput.value;

      if (taskText === "") return;

      let li = document.createElement("li");
      li.innerHTML = taskText + " <button class='delete' onclick='this.parentElement.remove()'>X</button>";

      document.getElementById("list").appendChild(li);

      taskInput.value = "";
    }

    // ENTER key support
    document.getElementById("task").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        addTask();
      }
    });
  </script>

</body>
</html>
