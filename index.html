<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Todo App Save</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
      padding-top: 60px;
    }

    input {
      padding: 10px;
      width: 250px;
      font-size: 16px;
    }

    button {
      padding: 10px 15px;
      margin-left: 5px;
      cursor: pointer;
    }

    li {
      list-style: none;
      background: #222;
      margin: 10px auto;
      padding: 10px;
      width: 300px;
      display: flex;
      justify-content: space-between;
    }

    .delete {
      background: red;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

  <h1>My Todo App 📝</h1>

  <input id="task" placeholder="Enter task">
  <button onclick="addTask()">Add</button>

  <ul id="list"></ul>

  <script>
    let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

    function renderTasks() {
      let list = document.getElementById("list");
      list.innerHTML = "";

      tasks.forEach((t, index) => {
        let li = document.createElement("li");
        li.innerHTML = t + " <button class='delete' onclick='deleteTask(" + index + ")'>X</button>";
        list.appendChild(li);
      });
    }

    function addTask() {
      let taskInput = document.getElementById("task");
      let taskText = taskInput.value;

      if (taskText === "") return;

      tasks.push(taskText);
      localStorage.setItem("tasks", JSON.stringify(tasks));

      taskInput.value = "";
      renderTasks();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      localStorage.setItem("tasks", JSON.stringify(tasks));
      renderTasks();
    }

    document.getElementById("task").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        addTask();
      }
    });

    renderTasks();
  </script>

</body>
</html>
