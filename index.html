<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>JS Input Lesson</title>
</head>

<body style="text-align:center; font-family:Arial; padding-top:100px;">

  <h1>Input + JavaScript 🚀</h1>

  <input id="name" placeholder="Your name" style="padding:10px; font-size:16px;">

  <br><br>

  <button onclick="showName()" style="padding:10px 20px;">
    Show Name
  </button>

  <h2 id="output"></h2>

  <script>
    function showName() {
      let name = document.getElementById("name").value;
      document.getElementById("output").innerText = "Hello " + name + " 👋";
    }
  </script>

</body>
</html>
