<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>JS Practice</title>
</head>

<body style="text-align:center; font-family:Arial; padding-top:100px;">

  <h1>JavaScript First Step 🚀</h1>

  <button onclick="showMessage()" style="padding:10px 20px; font-size:18px;">
    Click Me
  </button>

  <p id="msg" style="font-size:22px; margin-top:20px;"></p>

  <script>
    function showMessage() {
      document.getElementById("msg").innerText = "Hello Zaw Moe 👋";
    }
  </script>

</body>
</html>
